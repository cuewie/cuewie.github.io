<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="darkreader-lock">
  <meta name="color-scheme" content="dark light">
  <meta name="robots" content="noindex, follow">
  <meta name="referrer" content="no-referrer">

  <link rel="icon" type="image/x-icon" sizes="16x16 32x32" href="/favicon.ico">

    <meta name="title" content="404 — cue">

    <meta name="theme-color" content="#c9a3df" media="(prefers-color-scheme: dark)">

  <link rel="preconnect" href="https://fonts.bunny.net" crossorigin>

  <link rel="stylesheet" href="/css/style.css">

  <style>
    body {
      min-block-size: 100dvb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Floating paw prints in the background */
    .paws {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .paw {
      position: absolute;
      font-size: clamp(1rem, 3vw, 1.5rem);
      opacity: 0;
      animation: drift 14s var(--delay, 0s) infinite linear;
      user-select: none;
    }

    @keyframes drift {
      0%   { transform: translateY(110dvb) rotate(var(--rot, 0deg)); opacity: 0; }
      5%   { opacity: 0.18; }
      90%  { opacity: 0.14; }
      100% { transform: translateY(-10dvb) rotate(var(--rot, 0deg)); opacity: 0; }
    }

    /* Main 404 content */
    .err-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem var(--gap);
      text-align: center;
    }

    /* Cat SVG container */
    .cat-wrap {
      position: relative;
      inline-size: clamp(100px, 28vw, 160px);
      block-size: clamp(100px, 28vw, 160px);
      margin-block-end: 0.5rem;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0);     }
      50%       { transform: translateY(-10px); }
    }

    /* 404 number with glitch */
    .err-num {
      font-family: var(--fh, 'Plus Jakarta Sans', sans-serif);
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 1;
      color: var(--c-head, #100c1a);
      position: relative;
      user-select: none;
    }

    .err-num::before,
    .err-num::after {
      content: '404';
      position: absolute;
      inset: 0;
      background: transparent;
    }

    .err-num::before {
      color: #d4a0e8;
      animation: glitch-a 6s 1.5s infinite;
    }

    .err-num::after {
      color: #a8d4e8;
      animation: glitch-b 6s 1.5s infinite;
    }

    @keyframes glitch-a {
      0%, 88%, 100% { clip-path: none; transform: none; opacity: 0; }
      89% { clip-path: inset(0 0 72% 0); transform: translateX(-4px); opacity: 1; }
      90% { clip-path: inset(55% 0 5% 0); transform: translateX(3px); opacity: 1; }
      91% { clip-path: inset(25% 0 45% 0); transform: translateX(-2px); opacity: 1; }
      92% { clip-path: none; opacity: 0; }
    }

    @keyframes glitch-b {
      0%, 88%, 100% { clip-path: none; transform: none; opacity: 0; }
      89% { clip-path: inset(60% 0 0 0); transform: translateX(4px); opacity: 1; }
      90% { clip-path: inset(0 0 60% 0); transform: translateX(-3px); opacity: 1; }
      91% { clip-path: inset(35% 0 35% 0); transform: translateX(2px); opacity: 1; }
      92% { clip-path: none; opacity: 0; }
    }

    .err-title {
      font-family: var(--fh, 'Plus Jakarta Sans', sans-serif);
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 700;
      color: var(--c-head, #100c1a);
      letter-spacing: -0.02em;
    }

    .err-desc {
      font-size: clamp(0.875rem, 2.5vw, 1rem);
      color: var(--c-muted, #7d6a90);
      line-height: 1.65;
      max-inline-size: 38ch;
    }

    .err-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      justify-content: center;
    }

    .err-brand {
      position: fixed;
      inset-block-start: 1rem;
      inset-inline-start: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--fh, 'Plus Jakarta Sans', sans-serif);
      font-weight: 700;
      font-size: 1rem;
      color: var(--c-muted, #7d6a90);
      z-index: 2;
      transition: color 150ms ease;
      text-decoration: none;
    }
    .err-brand img { border-radius: 9999px; }
    .err-brand:hover { color: var(--c-head, #100c1a); }

    @media (prefers-reduced-motion: reduce) {
      .cat-wrap { animation: none; }
      .paw      { animation: none; opacity: 0.1; }
      .err-num::before, .err-num::after { animation: none; opacity: 0; }
    }
  </style>
</head>

<body>
  <a class="err-brand" href="/">
    <img src="/assets/icons/header/chibicuewie.webp" alt="cue" width="26" height="26">

  <!-- Floating paw prints -->

    <span class="paw" style="--delay:6s;   --rot:20deg;  left:70%">🐾</span>

    <span class="paw" style="--delay:10s;  --rot:-20deg; left:62%">🐾</span>
    <span class="paw" style="--delay:5s;   --rot:3deg;   left:46%">🐾</span>
    <span class="paw" style="--delay:7s;   --rot:-10deg; left:92%">🐾</span>

  <div class="err-wrap">

    <!-- Cat illustration using inline SVG -->
    <div class="cat-wrap" aria-hidden="true">
      <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
        <!-- Body -->
        <ellipse cx="80" cy="110" rx="38" ry="30" fill="var(--c-surface, #f3f0f9)"/>
        <!-- Head -->
        <circle cx="80" cy="72" r="34" fill="var(--c-surface, #f3f0f9)"/>
        <!-- Left ear -->

        <!-- Right ear -->

        <!-- Right ear inner -->
        <polygon points="107,42 113,26 97,39" fill="var(--c-accent, #c49ad6)" opacity="0.5"/>
        <!-- Left eye (closed/content — curved line) -->
        <path d="M66 70 Q70 65 74 70" stroke="var(--c-muted, #7d6a90)" stroke-width="2.5" stroke-linecap="round" fill="none">
          <animate attributeName="d" values="M66 70 Q70 65 74 70;M66 71 Q70 71 74 71;M66 70 Q70 65 74 70" dur="5s" repeatCount="indefinite"/>
        </path>

          <animate attributeName="d" values="M86 70 Q90 65 94 70;M86 71 Q90 71 94 71;M86 70 Q90 65 94 70" dur="5s" repeatCount="indefinite"/>
        </path>
        <!-- Nose -->
        <polygon points="80,78 77,74 83,74" fill="var(--c-accent, #c49ad6)" opacity="0.7"/>
        <!-- Mouth -->
        <path d="M77 79 Q80 83 83 79" stroke="var(--c-muted, #7d6a90)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
        <!-- Whiskers left -->
        <line x1="46" y1="76" x2="72" y2="78" stroke="var(--c-muted, #7d6a90)" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        <line x1="46" y1="80" x2="72" y2="80" stroke="var(--c-muted, #7d6a90)" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        <!-- Whiskers right -->
        <line x1="114" y1="76" x2="88" y2="78" stroke="var(--c-muted, #7d6a90)" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        <line x1="114" y1="80" x2="88" y2="80" stroke="var(--c-muted, #7d6a90)" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        <!-- Tail (curves out to the right) -->
        <path d="M118 120 Q140 90 128 72" stroke="var(--c-surface, #f3f0f9)" stroke-width="12" stroke-linecap="round" fill="none"/>
        <!-- Tail outline -->
        <path d="M118 120 Q140 90 128 72" stroke="var(--c-border, rgba(140,100,180,.2))" stroke-width="12" stroke-linecap="round" fill="none"/>
        <!-- Paw wave animation (right paw) -->
        <g transform-origin="80 130">
          <ellipse cx="104" cy="130" rx="10" ry="8" fill="var(--c-surface, #f3f0f9)">
            <animateTransform attributeName="transform" type="rotate" values="0 104 120;-18 104 120;0 104 120" dur="2s" repeatCount="indefinite"/>
          </ellipse>
        </g>
        <!-- Left paw -->
        <ellipse cx="58" cy="132" rx="10" ry="8" fill="var(--c-surface, #f3f0f9)"/>
        <!-- Blush marks -->
        <ellipse cx="64" cy="82" rx="7" ry="4" fill="var(--c-accent, #c49ad6)" opacity="0.25"/>
        <ellipse cx="96" cy="82" rx="7" ry="4" fill="var(--c-accent, #c49ad6)" opacity="0.25"/>
      </svg>
    </div>

    <p class="err-num" aria-label="Error 404">404</p>

    <h1 class="err-title">Nothing here but miss cat.</h1>

    <p class="err-desc">
      This page took a detour and got lost somewhere — probably chasing the cursor.
      Let's get you back to somewhere real.
    </p>

    <div class="err-actions">
      <a class="btn btn-primary" href="/">Take me home</a>
      <a class="btn btn-ghost" href="mailto:hello@cue.cat">Report this</a>
    </div>
  </div>

  <script>
    // Apply saved theme immediately to avoid flash
    (function() {
      var t = localStorage.getItem('theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

</body>
